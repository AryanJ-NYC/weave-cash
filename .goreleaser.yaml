version: 2

project_name: weave

builds:
  - id: weave
    dir: apps/cli
    main: ./cmd/weave
    binary: weave
    env:
      - CGO_ENABLED=0
    goos:
      - darwin
      - linux
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w

archives:
  - id: weave-archive
    ids:
      - weave
    formats:
      - tar.gz
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"

checksum:
  name_template: checksums.txt

release:
  github:
    owner: AryanJ-NYC
    name: weave-cash
  make_latest: true
