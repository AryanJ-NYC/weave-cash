name: CLI Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to publish (for example v0.1.4). Defaults to ref name.'
        required: false
        type: string

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: apps/cli/go.mod

      - name: Resolve release version
        id: release_meta
        run: |
          RELEASE_VERSION="${{ inputs.version }}"
          if [[ -z "${RELEASE_VERSION}" ]]; then
            RELEASE_VERSION="${GITHUB_REF_NAME}"
          fi
          echo "release_version=${RELEASE_VERSION}" >> "$GITHUB_OUTPUT"
          echo "release_version_no_v=${RELEASE_VERSION#v}" >> "$GITHUB_OUTPUT"

      - name: Check existing release
        id: release_exists
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if gh release view "${{ steps.release_meta.outputs.release_version }}" --repo "${GITHUB_REPOSITORY}" >/dev/null 2>&1; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Run GoReleaser
        if: steps.release_exists.outputs.exists != 'true'
        uses: goreleaser/goreleaser-action@v6
        with:
          distribution: goreleaser
          version: '~> v2'
          args: release --clean --config .goreleaser.yaml
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Download existing release artifacts
        if: steps.release_exists.outputs.exists == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          mkdir -p dist
          gh release download "${{ steps.release_meta.outputs.release_version }}" \
            --repo "${GITHUB_REPOSITORY}" \
            --dir dist \
            --pattern "weave_${{ steps.release_meta.outputs.release_version_no_v }}_darwin_amd64.tar.gz" \
            --pattern "weave_${{ steps.release_meta.outputs.release_version_no_v }}_darwin_arm64.tar.gz" \
            --pattern "weave_${{ steps.release_meta.outputs.release_version_no_v }}_linux_amd64.tar.gz" \
            --pattern "weave_${{ steps.release_meta.outputs.release_version_no_v }}_linux_arm64.tar.gz" \
            --pattern "checksums.txt"

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          registry-url: 'https://registry.npmjs.org'

      - name: Stage npm package
        run: |
          bash apps/cli/scripts/stage-npm-package.sh "${{ steps.release_meta.outputs.release_version }}" "dist" "packages/weave-cash-cli"

      - name: Publish npm package
        working-directory: packages/weave-cash-cli
        run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
